name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        go-version: ['1.26.x']
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - run: go build ./...
      - name: Build (with HQC tag)
        run: go build -tags hqc ./...
      - name: Test (all packages except slhdsa)
        run: go test -race -count=1 -timeout 30m $(go list ./... | grep -v /slhdsa)
      - name: Test (slhdsa - deep hypertree ACVP vectors)
        run: go test -race -count=1 -timeout 90m ./crypto/sign/slhdsa/...
      - name: Test (HQC tagged)
        run: go test -tags hqc -race -count=1 -timeout 30m $(go list -tags hqc ./... | grep -v /slhdsa)
      - run: go vet ./...
      - name: Vet (with HQC tag)
        run: go vet -tags hqc ./...
